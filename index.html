<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HALO OPTICAL PRO - V34</title>
    <style>
        :root {
            --bg-deep: #0a0b10;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary-purple: #9d7aff;
            --text-main: #f5f6f7;
            --text-dim: #8e9297;
            --success: #00e676;
            --danger: #ff5252;
            --sidebar-width: 240px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background-color: var(--bg-deep); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        /* 手机端侧边栏逻辑 */
        aside { 
            width: var(--sidebar-width); 
            background: rgba(10, 11, 16, 0.95); 
            border-right: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            z-index: 1000; 
            backdrop-filter: blur(20px); 
            transition: transform 0.3s ease;
        }

        @media (max-width: 850px) {
            aside { position: absolute; height: 100%; transform: translateX(-100%); }
            aside.open { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
            .mobile-header { display: flex !important; }
        }

        .mobile-header { 
            display: none; 
            position: fixed; top: 0; left: 0; right: 0; 
            height: 60px; background: rgba(0,0,0,0.8); 
            align-items: center; padding: 0 20px; 
            border-bottom: 1px solid var(--border-color); 
            z-index: 900; backdrop-filter: blur(10px);
            justify-content: space-between;
        }

        .brand { font-size: 18px; font-weight: 900; letter-spacing: 2px; text-align: center; margin-bottom: 30px; color: #fff; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        
        .nav-item { padding: 14px; border-radius: 12px; cursor: pointer; color: var(--text-dim); margin-bottom: 8px; font-size: 14px; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { background: var(--primary-purple); color: white; font-weight: bold; }
        
        .btn-sync { background: #222; border: 1px solid #444; color: #aaa; margin-top: auto; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 12px; text-align: center; }

        main { flex: 1; overflow-y: auto; padding: 20px; padding-top: 80px; scrollbar-width: none; }

        /* 列表显示 */
        .sph-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }

        .item-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 18px; padding: 18px; position: relative; }
        .qty-badge { background: rgba(157, 122, 255, 0.2); color: var(--primary-purple); padding: 5px 12px; border-radius: 8px; font-weight: bold; font-size: 18px; }

        /* 加大的数量按钮 */
        .qty-ctrl { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 8px; margin-top: 15px; border: 1px solid var(--border-color); }
        .qty-btn { width: 50px; height: 50px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 26px; font-weight: bold; cursor: pointer; }
        .qty-btn:active { background: var(--primary-purple); transform: scale(0.95); }
        .qty-val { font-size: 22px; font-weight: bold; color: var(--primary-purple); }

        .input-note { background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); padding: 12px; border-radius: 10px; color: white; width: 100%; margin-top: 15px; font-size: 14px; }
        
        .btn-action { padding: 15px; border-radius: 12px; border: none; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }
        .btn-in { background: #fff; color: #000; }
        .btn-out-menu { background: transparent; color: var(--danger); border: 1px solid var(--danger); }

        .out-panel { display: none; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; margin-top: 10px; }
        .dest-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .dest-btn { padding: 12px 5px; font-size: 12px; text-align: center; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; color: var(--text-dim); }
        .dest-btn.selected { background: var(--primary-purple); color: white; }

        .btn-confirm { background: #333; color: #666; padding: 15px; border-radius: 12px; border: none; width: 100%; font-weight: bold; cursor: not-allowed; }
        .btn-confirm.active { background: var(--success) !important; color: white !important; cursor: pointer !important; }

        /* 搜索框 */
        .search-box { width: 100%; padding: 15px; border-radius: 12px; background: var(--card-bg); border: 1px solid var(--border-color); color: white; font-size: 16px; margin-bottom: 20px; }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

<div class="mobile-header">
    <div onclick="toggleMenu()" style="font-size: 24px;">☰</div>
    <div style="font-weight: bold; letter-spacing: 1px;">HALO OPTICAL</div>
    <div onclick="location.reload()" style="font-size: 20px;">🔄</div>
</div>

<aside id="sidebar">
    <div class="brand">HALO OPTICAL</div>
    
    <div style="background:rgba(157,122,255,0.1); padding:15px; border-radius:15px; margin-bottom:20px;">
        <div id="curBranchName" style="font-size:16px; font-weight:bold; color:var(--primary-purple)">JURU</div>
        <div style="font-size:10px; opacity:0.5;">CURRENT BRANCH</div>
    </div>
    
    <nav>
        <div class="nav-item active" id="nav-dash" onclick="showPage('dash')">📊 Dashboard</div>
        <div class="nav-item" id="nav-stock" onclick="showPage('stock')">📦 Inventory</div>
        <div class="nav-item" id="nav-hist" onclick="showPage('hist')">📝 History</div>
    </nav>

    <button class="nav-item" style="border:1px solid var(--primary-purple); background:none; color:var(--primary-purple); width:100%; margin-top:10px;" onclick="addNewCategory()">➕ Add New Item</button>

    <hr style="opacity:0.1; margin:20px 0;">
    <div style="font-size:11px; color:var(--text-dim); margin-left:10px; margin-bottom:10px;">SWITCH BRANCH</div>
    <div class="nav-item" onclick="setBranch('JURU')">🏠 JURU</div>
    <div class="nav-item" onclick="setBranch('ICONIC POINT')">🏢 ICONIC POINT</div>
    <div class="nav-item" onclick="setBranch('MACHANG BUBOK')">🏬 MACHANG BUBOK</div>

    <button class="btn-sync" onclick="shareData()">📲 CLOUD DATA SYNC</button>
</aside>

<main onclick="closeMenu()">
    <div id="dashPage">
        <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:20px;">
            <div class="item-card" style="text-align:center;"><div id="totalQty" style="font-size:24px; font-weight:bold; color:var(--primary-purple)">0</div><div style="font-size:10px; opacity:0.5;">TOTAL ITEMS</div></div>
            <div class="item-card" style="text-align:center;"><div id="logCount" style="font-size:24px; font-weight:bold;">0</div><div style="font-size:10px; opacity:0.5;">TODAY LOGS</div></div>
        </div>
        <div id="dashContent"></div>
    </div>

    <div id="stockPage" style="display:none;">
        <input type="text" id="lensSearch" class="search-box" placeholder="快速查找 (例: PL 或 +0.25)" oninput="renderStock()">
        
        <div id="seriesTabs" style="display:flex; gap:10px; margin-bottom:15px; overflow-x:auto; padding-bottom:5px;"></div>
        
        <div style="display:flex; gap:12px;">
            <div id="cylSide" style="width:85px; display:flex; flex-direction:column; gap:8px;"></div>
            <div id="sphList" class="sph-list" style="flex:1"></div>
        </div>
    </div>

    <div id="histPage" style="display:none;">
        <div id="logList"></div>
    </div>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('halo_v34_db') || '{}');
    let logs = JSON.parse(localStorage.getItem('halo_v34_logs') || '[]');
    let categories = JSON.parse(localStorage.getItem('halo_v34_cats') || '["1.56 UVNEX", "1.61 UVNEX", "1.67 UVNEX"]');

    let curBranch = "JURU", curS = categories[0], curC = "NONE", actionQty = {};
    const BRANCHES = ["JURU", "BM", "MB", "KULIM", "IP", "ICON"];
    const CYLs = ["NONE", "-0.25", "-0.50", "-0.75", "-1.00", "-1.25", "-1.50", "-1.75", "-2.00"];

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    function closeMenu() { document.getElementById('sidebar').classList.remove('open'); }

    function setBranch(b) { curBranch = b; document.getElementById('curBranchName').innerText = b; closeMenu(); refresh(); }
    function showPage(p) { ['dash','stock','hist'].forEach(id => document.getElementById(id+'Page').style.display = (id===p?'block':'none')); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); if(document.getElementById('nav-'+p)) document.getElementById('nav-'+p).classList.add('active'); closeMenu(); refresh(); }

    function addNewCategory() {
        let name = prompt("Enter New Item Name:");
        if(name && !categories.includes(name)) {
            categories.push(name); localStorage.setItem('halo_v34_cats', JSON.stringify(categories));
            curS = name; refresh();
        }
    }

    function refresh() {
        if(document.getElementById('dashPage').style.display !== 'none') renderDash();
        if(document.getElementById('stockPage').style.display !== 'none') renderStock();
        if(document.getElementById('histPage').style.display !== 'none') renderHist();
    }

    function renderDash() {
        let total = 0; const container = document.getElementById('dashContent'); container.innerHTML = '';
        categories.forEach(s => {
            let items = [];
            Object.keys(db).forEach(k => { if(k.startsWith(`${curBranch}|${s}|`) && db[k] > 0) { const p = k.split('|'); items.push({sph: p[2], cyl: p[3], q: db[k]}); total += db[k]; } });
            if(items.length > 0) {
                let html = `<div style="margin-bottom:25px;"><div style="color:var(--primary-purple); font-size:13px; font-weight:bold; margin-bottom:10px;">${s}</div><div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap:10px;">`;
                items.forEach(i => { html += `<div class="item-card" style="padding:15px; border-left:4px solid var(--primary-purple);"><b style="font-size:16px;">${i.sph}/${i.cyl}</b><div style="color:var(--primary-purple); font-weight:bold; margin-top:5px;">Qty: ${i.q}</div></div>`; });
                container.innerHTML += html + `</div></div>`;
            }
        });
        document.getElementById('totalQty').innerText = total;
        document.getElementById('logCount').innerText = logs.filter(l => l.b === curBranch).length;
    }

    function renderStock() {
        const query = document.getElementById('lensSearch').value.toLowerCase().trim();
        document.getElementById('seriesTabs').innerHTML = categories.map(s => `<div class="nav-item ${curS===s?'active':''}" style="min-width:120px; justify-content:center;" onclick="curS='${s}';renderStock();">${s}</div>`).join('');
        document.getElementById('cylSide').innerHTML = CYLs.map(c => `<div class="nav-item ${curC===c?'active':''}" onclick="curC='${c}';renderStock();">${c==='NONE'?'SPH':c}</div>`).join('');
        
        const list = document.getElementById('sphList'); list.innerHTML = '';
        let SPHs = []; for(let i=0; i>=-800; i-=25) SPHs.push(i===0?"PL":(i/100).toFixed(2));
        if(curS.includes("1.56") || curS.includes("1.6")) for(let i=25; i<=400; i+=25) SPHs.push("+"+(i/100).toFixed(2));

        SPHs.forEach(sph => {
            const displayDeg = `${sph}/${curC==='NONE'?'0.00':curC}`.toLowerCase();
            if(query && !displayDeg.includes(query)) return;

            const key = `${curBranch}|${curS}|${sph}|${curC}`;
            const id = key.replace(/[|.+ ]/g, '_'); // 兼容 + 号的 ID 逻辑
            const q = db[key] || 0;
            if(actionQty[id] === undefined) actionQty[id] = 0;

            const div = document.createElement('div');
            div.className = 'item-card';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b style="font-size:18px;">${sph}/${curC}</b>
                    <span class="qty-badge">${q}</span>
                </div>
                <div class="qty-ctrl">
                    <button class="qty-btn" onclick="changeQty('${id}', -1)">-</button>
                    <div class="qty-val" id="v-${id}">${actionQty[id]}</div>
                    <button class="qty-btn" onclick="changeQty('${id}', 1)">+</button>
                </div>
                <input type="text" id="note-${id}" class="input-note" placeholder="备注 (必填)">
                <div style="display:flex; gap:10px;">
                    <button class="btn-action btn-in" onclick="doIn('${key}','${sph}','${id}')">IN 入库</button>
                    <button class="btn-action btn-out-menu" onclick="toggleOut('${id}')">OUT ▾</button>
                </div>
                <div id="panel-${id}" class="out-panel">
                    <div class="dest-grid">${BRANCHES.map(b => `<div id="btn-${id}-${b}" class="dest-btn" onclick="selectDest('${id}','${b}')">${b}</div>`).join('')}</div>
                    <button id="conf-${id}" class="btn-confirm" onclick="doOut('${key}','${sph}','${id}')">确认出库</button>
                </div>`;
            list.appendChild(div);
        });
    }

    function changeQty(id, delta) { actionQty[id] = Math.max(0, (actionQty[id] || 0) + delta); document.getElementById(`v-${id}`).innerText = actionQty[id]; }

    let selectedMap = {};
    function toggleOut(id) { const p = document.getElementById('panel-'+id); p.style.display = (p.style.display==='block'?'none':'block'); }
    function selectDest(id, b) {
        selectedMap[id] = b; document.querySelectorAll(`#panel-${id} .dest-btn`).forEach(btn => btn.classList.remove('selected'));
        document.getElementById(`btn-${id}-${b}`).classList.add('selected');
        const confBtn = document.getElementById('conf-'+id); confBtn.classList.add('active'); confBtn.innerText = `发往 ${b}`;
    }

    function doIn(key, sph, id) {
        const q = actionQty[id], n = document.getElementById('note-'+id).value;
        if(q <= 0 || !n) return alert("请输入数量和备注！");
        db[key] = (db[key] || 0) + q;
        logs.unshift({t: new Date().toLocaleString(), b: curBranch, s: curS, sph, cyl: curC, diff: `+${q}`, n});
        actionQty[id] = 0; save();
    }

    function doOut(key, sph, id) {
        const dest = selectedMap[id], q = actionQty[id], n = document.getElementById('note-'+id).value;
        if(!dest || q <= 0 || !n) return alert("请选择分店、输入数量和备注！");
        if((db[key]||0) < q) return alert("库存不足！");
        db[key] = db[key] - q;
        logs.unshift({t: new Date().toLocaleString(), b: curBranch, s: curS, sph, cyl: curC, diff: `-${q}`, n: `${n} (To: ${dest})`});
        actionQty[id] = 0; save();
    }

    // 云同步功能 (通过 Base64 字符串)
    function shareData() {
        const mode = confirm("点击 [确定] 复制当前库存码到剪贴板 (用于发送到手机)\n点击 [取消] 输入别人的库存码 (用于接收电脑数据)");
        if(mode) {
            const dataStr = btoa(JSON.stringify({db, logs, categories}));
            navigator.clipboard.writeText(dataStr).then(() => alert("库存码已复制！请发送到手机并粘贴。"));
        } else {
            const code = prompt("请输入从电脑复制的库存码：");
            if(code) {
                try {
                    const parsed = JSON.parse(atob(code));
                    if(confirm("确定要覆盖当前设备的所有数据吗？")) {
                        db = parsed.db; logs = parsed.logs; categories = parsed.categories;
                        save(); location.reload();
                    }
                } catch(e) { alert("码不对，请重新复制。"); }
            }
        }
    }

    function save() { 
        localStorage.setItem('halo_v34_db', JSON.stringify(db)); 
        localStorage.setItem('halo_v34_logs', JSON.stringify(logs)); 
        localStorage.setItem('halo_v34_cats', JSON.stringify(categories));
        refresh(); 
    }
    
    function renderHist() {
        document.getElementById('logList').innerHTML = logs.filter(l => l.b === curBranch).map(l => `
            <div class="item-card" style="border-left:5px solid ${l.diff.includes('+')?'var(--success)':'var(--danger)'}; margin-bottom:12px;">
                <div style="font-size:11px; opacity:0.5;">${l.t}</div>
                <div style="display:flex; justify-content:space-between; margin-top:8px;"><b>${l.s} | ${l.sph}/${l.cyl}</b><b style="color:${l.diff.includes('+')?'var(--success)':'var(--danger)'}">${l.diff}</b></div>
                <div style="font-size:13px; margin-top:8px; opacity:0.8">${l.n}</div>
            </div>`).join('');
    }

    showPage('dash');
</script>
</body>
</html>
