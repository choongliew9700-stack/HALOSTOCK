<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HALO OPTICAL PRO - V37</title>
    <style>
        :root { --bg: #0a0b10; --card: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1); --purple: #9d7aff; --text: #f5f6f7; --sidebar-w: 240px; --success: #00e676; --danger: #ff5252; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        aside { width: var(--sidebar-w); background: rgba(0,0,0,0.9); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; z-index: 1000; backdrop-filter: blur(20px); transition: 0.3s; }
        @media (max-width: 850px) { aside { position: absolute; height: 100%; transform: translateX(-100%); } aside.open { transform: translateX(0); box-shadow: 20px 0 50px #000; } .mobile-header { display: flex !important; } main { padding-top: 70px !important; } }
        .mobile-header { display: none; position: fixed; top: 0; left: 0; right: 0; height: 60px; background: #000; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); z-index: 900; justify-content: space-between; }
        .nav-item { padding: 14px; border-radius: 12px; cursor: pointer; color: #8e9297; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .nav-item.active { background: var(--purple); color: white; font-weight: bold; }
        main { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: none; }
        .sph-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .item-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 18px; }
        .qty-ctrl { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 8px; margin-top: 10px; border: 1px solid var(--border); }
        .qty-btn { width: 45px; height: 45px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 24px; cursor: pointer; }
        .qty-val { font-size: 22px; font-weight: bold; color: var(--purple); }
        .input-note { background: rgba(0,0,0,0.5); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: white; width: 100%; margin-top: 10px; font-size: 14px; }
        .btn-action { padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }
        .btn-in { background: #fff; color: #000; }
        .btn-out-menu { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .out-panel { display: none; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-top: 10px; }
        .dest-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .dest-btn { padding: 10px 2px; font-size: 10px; text-align: center; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; color: #8e9297; }
        .dest-btn.selected { background: var(--purple) !important; color: white !important; }
        .btn-confirm { background: #222; color: #555; padding: 15px; border-radius: 12px; border: none; width: 100%; font-weight: bold; cursor: not-allowed; }
        .btn-confirm.active { background: var(--success) !important; color: white !important; cursor: pointer !important; }
        .search-box { width: 100%; padding: 15px; border-radius: 12px; background: var(--card); border: 1px solid var(--border); color: white; margin-bottom: 20px; }
        .branch-list { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
    </style>
</head>
<body>

<div class="mobile-header">
    <div onclick="document.getElementById('sidebar').classList.toggle('open')">☰</div>
    <div style="font-weight: bold;">HALO OPTICAL</div>
    <div onclick="location.reload()">🔄</div>
</div>

<aside id="sidebar">
    <div style="font-size: 18px; font-weight: 900; margin-bottom: 20px; text-align: center;">HALO OPTICAL</div>
    <div style="background:rgba(157,122,255,0.1); padding:15px; border-radius:15px; margin-bottom:20px; text-align:center;">
        <div id="curBN" style="font-weight:bold; color:var(--purple)">JURU</div>
    </div>
    <nav>
        <div class="nav-item active" id="nav-dash" onclick="showP('dash')">📊 Dashboard</div>
        <div class="nav-item" id="nav-stock" onclick="showP('stock')">📦 Inventory</div>
        <div class="nav-item" id="nav-hist" onclick="showP('hist')">📝 History</div>
    </nav>
    <button class="nav-item" style="border:1px solid var(--purple); background:none; color:var(--purple); width:100%; margin-top:10px;" onclick="addCat()">➕ Add Category</button>
    <button class="nav-item" style="border:1px solid #4CAF50; background:none; color:#4CAF50; width:100%; margin-top:5px;" onclick="addBranch()">🏠 Add Branch</button>
    <button class="nav-item" style="border:1px solid #ffb100; background:none; color:#ffb100; width:100%; margin-top:5px;" onclick="exportCSV()">📥 Export Branch Data</button>
    <div class="branch-list" id="branchContainer"></div>
</aside>

<main onclick="document.getElementById('sidebar').classList.remove('open')">
    <div id="dashP">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;">
            <div class="item-card" style="text-align:center;"><div id="tQ" style="font-size:24px; color:var(--purple)">0</div><div>Total</div></div>
            <div class="item-card" style="text-align:center;"><div id="lC" style="font-size:24px;">0</div><div>Logs</div></div>
        </div>
        <div id="dashC"></div>
    </div>
    <div id="stockP" style="display:none;">
        <input type="text" id="srch" class="search-box" placeholder="查找 (例: PL 或 +0.25)" oninput="renderS()">
        <div id="tabs" style="display:flex; gap:10px; margin-bottom:15px; overflow-x:auto; padding-bottom:5px;"></div>
        <div style="display:flex; gap:12px;">
            <div id="cylS" style="width:80px; display:flex; flex-direction:column; gap:8px;"></div>
            <div id="sphL" class="sph-list" style="flex:1"></div>
        </div>
    </div>
    <div id="histP" style="display:none;"><div id="logL"></div></div>
</main>

<script>
    function playPop() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const o = ctx.createOscillator(), g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.frequency.setValueAtTime(600, ctx.currentTime);
            o.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.1);
            g.gain.setValueAtTime(0.1, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            o.start(); o.stop(ctx.currentTime + 0.1);
        } catch(e) {}
    }

    let db = JSON.parse(localStorage.getItem('halo_v34_db') || '{}');
    let logs = JSON.parse(localStorage.getItem('halo_v34_logs') || '[]');
    let cats = JSON.parse(localStorage.getItem('halo_v34_cats') || '["1.56 UVNEX", "1.61 UVNEX", "1.67 UVNEX"]');
    let branches = JSON.parse(localStorage.getItem('halo_v34_branches') || '["JURU", "ICONIC POINT", "MACHANG BUBOK"]');
    
    let curB = branches[0], curS = cats[0], curC = "NONE", actQ = {}, selectedDestMap = {};
    const TRANS_BRANCHES = ["JURU", "BM", "MB", "KULIM", "IP", "ICON"];
    const CYLS = ["NONE","-0.25","-0.50","-0.75","-1.00","-1.25","-1.50","-1.75","-2.00"];

    function setB(b) { playPop(); curB = b; document.getElementById('curBN').innerText = b; renderBranchList(); refresh(); }
    function addBranch() {
        playPop(); let b = prompt("New Branch Name:");
        if(b && !branches.includes(b)) { branches.push(b); localStorage.setItem('halo_v34_branches', JSON.stringify(branches)); renderBranchList(); setB(b); }
    }
    function renderBranchList() {
        const c = document.getElementById('branchContainer');
        c.innerHTML = branches.map(b => `<div class="nav-item ${curB===b?'active':''}" onclick="setB('${b}')">${b}</div>`).join('');
    }
    function showP(p) { 
        playPop(); ['dash','stock','hist'].forEach(i => document.getElementById(i+'P').style.display = (i===p?'block':'none')); 
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); 
        if(document.getElementById('nav-'+p)) document.getElementById('nav-'+p).classList.add('active'); 
        refresh(); 
    }
    function addCat() { playPop(); let n = prompt("New Category:"); if(n && !cats.includes(n)) { cats.push(n); save(); curS=n; refresh(); } }

    function exportCSV() {
        playPop(); let csv = "Branch,Category,SPH,CYL,Quantity\n", has = false;
        cats.forEach(s => {
            let sps = []; for(let i=0; i>=-800; i-=25) sps.push(i===0?"PL":(i/100).toFixed(2));
            if(s.includes("1.56") || s.includes("1.6")) for(let i=25; i<=400; i+=25) sps.push("+"+(i/100).toFixed(2));
            sps.forEach(h => { CYLS.forEach(y => { const k = `${curB}|${s}|${h}|${y}`; if(db[k]>0){ csv += `${curB},${s},${h},${y},${db[k]}\n`; has=true; } }); });
        });
        if(!has) return alert("No data!");
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `HALO_${curB}_Stock.csv`; a.click();
    }

    function refresh() {
        if(document.getElementById('dashP').style.display !== 'none') {
            let t = 0; const c = document.getElementById('dashC'); c.innerHTML = '';
            cats.forEach(s => {
                let its = []; Object.keys(db).forEach(k => { if(k.startsWith(`${curB}|${s}|`) && db[k] > 0) { const p = k.split('|'); its.push({h:p[2], y:p[3], q:db[k]}); t+=db[k]; } });
                if(its.length > 0) {
                    let h = `<div style="margin-bottom:20px;"><div style="color:var(--purple); font-size:13px; font-weight:bold; margin-bottom:10px;">${s}</div><div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px;">`;
                    its.forEach(i => h += `<div class="item-card" style="padding:10px; border-left:4px solid var(--purple);"><b>${i.h}/${i.y}</b><br><small>Qty: ${i.q}</small></div>`);
                    c.innerHTML += h + '</div></div>';
                }
            });
            document.getElementById('tQ').innerText = t;
            document.getElementById('lC').innerText = logs.filter(l => l.b === curB).length;
        }
        if(document.getElementById('stockP').style.display !== 'none') renderS();
        if(document.getElementById('histP').style.display !== 'none') {
            document.getElementById('logL').innerHTML = logs.filter(l => l.b === curB).map(l => `<div class="item-card" style="margin-bottom:12px; border-left:5px solid ${l.d.includes('+')?'var(--success)':'var(--danger)'}"><small style="opacity:0.5">${l.t}</small><div style="display:flex; justify-content:space-between; margin-top:8px;"><b>${l.s} | ${l.h}/${l.y}</b><b>${l.d}</b></div><div style="font-size:13px; margin-top:8px;">${l.n}</div></div>`).join('');
        }
    }

    function renderS() {
        const q = document.getElementById('srch').value.toLowerCase();
        document.getElementById('tabs').innerHTML = cats.map(s => `<div class="nav-item ${curS===s?'active':''}" style="min-width:120px; justify-content:center;" onclick="playPop();curS='${s}';renderS();">${s}</div>`).join('');
        document.getElementById('cylS').innerHTML = CYLS.map(c => `<div class="nav-item ${curC===c?'active':''}" onclick="playPop();curC='${c}';renderS();">${c==='NONE'?'SPH':c}</div>`).join('');
        const l = document.getElementById('sphL'); l.innerHTML = '';
        let sps = []; for(let i=0; i>=-800; i-=25) sps.push(i===0?"PL":(i/100).toFixed(2));
        if(curS.includes("1.56") || curS.includes("1.6")) for(let i=25; i<=400; i+=25) sps.push("+"+(i/100).toFixed(2));
        sps.forEach(h => {
            if(q && !`${h}/${curC}`.toLowerCase().includes(q)) return;
            const k = `${curB}|${curS}|${h}|${curC}`, id = k.replace(/[|.+ ]/g, '_'), v = db[k] || 0;
            if(actQ[id] === undefined) actQ[id] = 0;
            const d = document.createElement('div'); d.className = 'item-card';
            d.innerHTML = `
                <div style="display:flex; justify-content:space-between;"><b>${h}/${curC}</b><span style="color:var(--purple); font-weight:bold;">${v}</span></div>
                <div class="qty-ctrl"><button class="qty-btn" onclick="chgQ('${id}',-1)">-</button><div class="qty-val" id="v-${id}">${actQ[id]}</div><button class="qty-btn" onclick="chgQ('${id}',1)">+</button></div>
                <input type="text" id="n-${id}" class="input-note" placeholder="备注 (Required)">
                <button class="btn-action btn-in" onclick="doIn('${k}','${h}','${id}')">IN 入库</button>
                <button class="btn-action btn-out-menu" onclick="toggleOut('${id}')">OUT 出库 ▾</button>
                <div id="p-${id}" class="out-panel">
                    <div class="dest-grid">${TRANS_BRANCHES.map(b => `<div id="b-${id}-${b}" class="dest-btn" onclick="selD('${id}','${b}')">${b}</div>`).join('')}</div>
                    <button id="cf-${id}" class="btn-confirm" onclick="doOut('${k}','${h}','${id}')">CONFIRM OUT</button>
                </div>`;
            l.appendChild(d);
        });
    }

    function chgQ(id, d) { playPop(); actQ[id] = Math.max(0, (actQ[id] || 0) + d); document.getElementById(`v-${id}`).innerText = actQ[id]; }
    function toggleOut(id) { playPop(); const p = document.getElementById('p-'+id); p.style.display = (p.style.display==='block'?'none':'block'); }
    function selD(id, b) { playPop(); selectedDestMap[id] = b; document.querySelectorAll(`#p-${id} .dest-btn`).forEach(btn => btn.classList.remove('selected')); document.getElementById(`b-${id}-${b}`).classList.add('selected'); const cf = document.getElementById('cf-'+id); cf.classList.add('active'); cf.innerText = `SEND TO ${b}`; }
    
    function doIn(k, h, id) { 
        playPop(); const q = actQ[id], n = document.getElementById('n-'+id).value; 
        if(q<=0 || !n) return alert("Qty & Note Required!"); 
        db[k] = (db[k] || 0) + q; 
        logs.unshift({t:new Date().toLocaleString(), b:curB, s:curS, h, y:curC, d:`+${q}`, n}); 
        actQ[id]=0; save(); 
    }

    function doOut(k, h, id) { 
        playPop(); const dest = selectedDestMap[id], q = actQ[id], n = document.getElementById('n-'+id).value; 
        if(!dest || q<=0 || !n) return alert("Select Branch, Qty & Note!"); 
        if((db[k]||0)<q) return alert("No stock!"); 
        db[k] -= q; 
        logs.unshift({t:new Date().toLocaleString(), b:curB, s:curS, h, y:curC, d:`-${q}`, n: `${n} (To: ${dest})`}); 
        actQ[id]=0; save(); 
    }
    
    function save() { 
        localStorage.setItem('halo_v34_db', JSON.stringify(db)); 
        localStorage.setItem('halo_v34_logs', JSON.stringify(logs)); 
        localStorage.setItem('halo_v34_cats', JSON.stringify(cats)); 
        localStorage.setItem('halo_v34_branches', JSON.stringify(branches));
        refresh(); 
    }

    renderBranchList();
    showP('dash');
</script>
</body>
</html>
