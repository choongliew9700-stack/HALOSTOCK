<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HALO OPTICAL - V33 FIXED</title>
    <style>
        :root {
            --bg-deep: #0a0b10;
            --card-bg: rgba(255, 255, 255, 0.04);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary-purple: #7c4dff;
            --text-main: #f5f6f7;
            --text-dim: #8e9297;
            --success: #00e676;
            --danger: #ff5252;
            --sidebar-width: 200px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg-deep); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        /* 侧边栏 */
        aside { width: var(--sidebar-width); background: rgba(0,0,0,0.6); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 15px; z-index: 100; backdrop-filter: blur(15px); }
        .brand { font-size: 16px; font-weight: 800; letter-spacing: 2px; text-align: center; margin-bottom: 25px; color: #fff; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }

        .nav-item { padding: 12px; border-radius: 8px; cursor: pointer; color: var(--text-dim); margin-bottom: 5px; font-size: 13px; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .nav-item.active { background: rgba(124, 77, 255, 0.2); color: var(--primary-purple); font-weight: bold; }
        .btn-add-item { background: var(--primary-purple); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 12px; }

        main { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: none; }

        .item-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 15px; padding: 15px; margin-bottom: 5px; }
        .sph-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        @media (max-width: 1100px) { .sph-list { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 750px) { .sph-list { grid-template-columns: 1fr; } }

        /* 数量控制器 */
        .qty-ctrl { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 5px; margin-top: 10px; border: 1px solid var(--border-color); }
        .qty-btn { width: 40px; height: 40px; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 20px; font-weight: bold; cursor: pointer; }
        .qty-btn:active { background: var(--primary-purple); }
        .qty-val { font-size: 18px; font-weight: bold; color: var(--primary-purple); }

        .input-note { background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); padding: 10px; border-radius: 8px; color: white; width: 100%; margin-top: 10px; font-size: 13px; }
        
        .btn-action { padding: 12px; border-radius: 8px; border: none; font-size: 13px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }
        .btn-in { background: #333; color: white; border: 1px solid #555; }
        .btn-out-menu { background: transparent; color: var(--danger); border: 1px solid var(--danger); }

        .out-panel { display: none; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; margin-top: 10px; }
        .dest-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .dest-btn { padding: 10px 2px; font-size: 10px; text-align: center; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; color: var(--text-dim); }
        .dest-btn.selected { background-color: var(--primary-purple) !important; color: white !important; }

        .btn-confirm { background: #222; color: #555; padding: 12px; border-radius: 8px; border: none; width: 100%; font-weight: bold; cursor: not-allowed; }
        .btn-confirm.active { background: var(--success) !important; color: white !important; cursor: pointer !important; }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

<aside>
    <div class="brand">HALO OPTICAL</div>
    <div style="background:rgba(124,77,255,0.1); padding:12px; border-radius:10px; margin-bottom:15px;">
        <div id="curBranchName" style="font-size:14px; font-weight:bold;">JURU</div>
    </div>
    
    <nav>
        <div class="nav-item active" id="nav-dash" onclick="showPage('dash')">📊 Dashboard</div>
        <div class="nav-item" id="nav-stock" onclick="showPage('stock')">📦 Inventory</div>
        <div class="nav-item" id="nav-hist" onclick="showPage('hist')">📝 History</div>
    </nav>

    <button class="btn-add-item" onclick="addNewCategory()">➕ ADD NEW ITEM</button>

    <hr style="opacity:0.1; margin:15px 0;">
    <div class="nav-item" onclick="setBranch('JURU')">🏠 JURU</div>
    <div class="nav-item" onclick="setBranch('ICONIC POINT')">🏢 ICONIC POINT</div>
    <div class="nav-item" onclick="setBranch('MACHANG BUBOK')">🏬 MACHANG BUBOK</div>
</aside>

<main>
    <div id="dashPage">
        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px;">
            <div class="item-card" style="text-align:center;"><div id="totalQty" style="font-size:22px; font-weight:bold; color:var(--primary-purple)">0</div><div style="font-size:10px; opacity:0.6;">TOTAL</div></div>
            <div class="item-card" style="text-align:center;"><div id="logCount" style="font-size:22px; font-weight:bold;">0</div><div style="font-size:10px; opacity:0.6;">LOGS</div></div>
            <div class="item-card" style="text-align:center; border-color:var(--success)"><div style="font-size:12px; color:var(--success); font-weight:bold;">READY</div></div>
        </div>
        <div id="dashContent"></div>
    </div>

    <div id="stockPage" style="display:none;">
        <div id="seriesTabs" style="display:flex; gap:10px; margin-bottom:15px; overflow-x:auto; padding-bottom:5px;"></div>
        <div style="display:flex; gap:15px;">
            <div id="cylSide" style="width:80px; display:flex; flex-direction:column; gap:5px;"></div>
            <div id="sphList" class="sph-list" style="flex:1"></div>
        </div>
    </div>

    <div id="histPage" style="display:none;">
        <div id="logList"></div>
    </div>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('halo_v33_db') || '{}');
    let logs = JSON.parse(localStorage.getItem('halo_v33_logs') || '[]');
    let categories = JSON.parse(localStorage.getItem('halo_v33_cats') || '["1.56 UVNEX", "1.61 UVNEX", "1.67 UVNEX"]');

    let curBranch = "JURU", curS = categories[0], curC = "NONE", actionQty = {};
    const BRANCHES = ["JURU", "BM", "MB", "KULIM", "IP", "ICON"];
    const CYLs = ["NONE", "-0.25", "-0.50", "-0.75", "-1.00", "-1.25", "-1.50", "-1.75", "-2.00"];

    function playPop() { try { const ctx = new AudioContext(); const o = ctx.createOscillator(), g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.setValueAtTime(800, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1); o.start(); o.stop(ctx.currentTime + 0.1); } catch(e){} }

    function addNewCategory() {
        let name = prompt("Enter New Item Name:");
        if(name && !categories.includes(name)) {
            categories.push(name); localStorage.setItem('halo_v33_cats', JSON.stringify(categories));
            curS = name; refresh();
        }
    }

    function setBranch(b) { curBranch = b; document.getElementById('curBranchName').innerText = b; refresh(); }
    function showPage(p) { ['dash','stock','hist'].forEach(id => document.getElementById(id+'Page').style.display = (id===p?'block':'none')); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); if(document.getElementById('nav-'+p)) document.getElementById('nav-'+p).classList.add('active'); refresh(); }

    function refresh() {
        if(document.getElementById('dashPage').style.display !== 'none') renderDash();
        if(document.getElementById('stockPage').style.display !== 'none') renderStock();
        if(document.getElementById('histPage').style.display !== 'none') renderHist();
    }

    function renderDash() {
        let total = 0; const container = document.getElementById('dashContent'); container.innerHTML = '';
        categories.forEach(s => {
            let items = [];
            Object.keys(db).forEach(k => { if(k.startsWith(`${curBranch}|${s}|`) && db[k] > 0) { const p = k.split('|'); items.push({sph: p[2], cyl: p[3], q: db[k]}); total += db[k]; } });
            if(items.length > 0) {
                let html = `<div style="margin-bottom:20px;"><div style="color:var(--primary-purple); font-size:12px; font-weight:bold; margin-bottom:10px;">${s}</div><div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap:10px;">`;
                items.forEach(i => { html += `<div class="item-card" style="padding:10px; border-left:3px solid var(--primary-purple);"><b>${i.sph}/${i.cyl}</b><br><span>Qty: ${i.q}</span></div>`; });
                container.innerHTML += html + `</div></div>`;
            }
        });
        document.getElementById('totalQty').innerText = total;
        document.getElementById('logCount').innerText = logs.filter(l => l.b === curBranch).length;
    }

    function renderStock() {
        document.getElementById('seriesTabs').innerHTML = categories.map(s => `<div class="nav-item ${curS===s?'active':''}" onclick="curS='${s}';renderStock();">${s}</div>`).join('');
        document.getElementById('cylSide').innerHTML = CYLs.map(c => `<div class="nav-item ${curC===c?'active':''}" onclick="curC='${c}';renderStock();">${c==='NONE'?'SPH':c}</div>`).join('');
        const list = document.getElementById('sphList'); list.innerHTML = '';
        
        let SPHs = []; for(let i=0; i>=-800; i-=25) SPHs.push(i===0?"PL":(i/100).toFixed(2));
        if(curS.includes("1.56")) for(let i=25; i<=400; i+=25) SPHs.push("+"+(i/100).toFixed(2));

        SPHs.forEach(sph => {
            const key = `${curBranch}|${curS}|${sph}|${curC}`;
            // 关键：修复 ID 生成，支持带有 + 号的 ID
            const id = key.replace(/[|.+ ]/g, '_'); 
            const q = db[key] || 0;
            if(actionQty[id] === undefined) actionQty[id] = 0;

            const div = document.createElement('div');
            div.className = 'item-card';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;"><b>${sph}/${curC}</b><span class="qty-badge" style="background:rgba(124,77,255,0.1); padding:4px 8px; border-radius:5px; color:var(--primary-purple)">${q}</span></div>
                <div class="qty-ctrl">
                    <button class="qty-btn" onclick="changeQty('${id}', -1)">-</button>
                    <div class="qty-val" id="v-${id}">${actionQty[id]}</div>
                    <button class="qty-btn" onclick="changeQty('${id}', 1)">+</button>
                </div>
                <input type="text" id="note-${id}" class="input-note" placeholder="Note (Required)">
                <button class="btn-action btn-in" onclick="doIn('${key}','${sph}','${id}')">IN (进库)</button>
                <button class="btn-action btn-out-menu" onclick="toggleOut('${id}')">OUT (出库) ▾</button>
                <div id="panel-${id}" class="out-panel">
                    <div class="dest-grid">${BRANCHES.map(b => `<div id="btn-${id}-${b}" class="dest-btn" onclick="selectDest('${id}','${b}')">${b}</div>`).join('')}</div>
                    <button id="conf-${id}" class="btn-confirm" onclick="doOut('${key}','${sph}','${id}')">CONFIRM OUT</button>
                </div>`;
            list.appendChild(div);
        });
    }

    function changeQty(id, delta) { 
        playPop(); 
        actionQty[id] = Math.max(0, (actionQty[id] || 0) + delta); 
        document.getElementById(`v-${id}`).innerText = actionQty[id]; 
    }

    let selectedMap = {};
    function toggleOut(id) { playPop(); const p = document.getElementById('panel-'+id); p.style.display = (p.style.display==='block'?'none':'block'); }
    function selectDest(id, b) {
        playPop(); selectedMap[id] = b;
        document.querySelectorAll(`#panel-${id} .dest-btn`).forEach(btn => btn.classList.remove('selected'));
        document.getElementById(`btn-${id}-${b}`).classList.add('selected');
        const confBtn = document.getElementById('conf-'+id);
        confBtn.classList.add('active'); confBtn.innerText = `SEND TO ${b}`;
    }

    function doIn(key, sph, id) {
        const q = actionQty[id], n = document.getElementById('note-'+id).value;
        if(q <= 0 || !n) return alert("Qty must > 0 and Note is required!");
        db[key] = (db[key] || 0) + q;
        logs.unshift({t: new Date().toLocaleString(), b: curBranch, s: curS, sph, cyl: curC, diff: `+${q}`, n});
        actionQty[id] = 0; save();
    }

    function doOut(key, sph, id) {
        const dest = selectedMap[id], q = actionQty[id], n = document.getElementById('note-'+id).value;
        if(!dest || q <= 0 || !n) return alert("Select Branch, Qty > 0, and Fill Note!");
        if((db[key]||0) < q) return alert("No enough stock!");
        db[key] = db[key] - q;
        logs.unshift({t: new Date().toLocaleString(), b: curBranch, s: curS, sph, cyl: curC, diff: `-${q}`, n: `${n} (To: ${dest})`});
        actionQty[id] = 0; save();
    }

    function save() { localStorage.setItem('halo_v33_db', JSON.stringify(db)); localStorage.setItem('halo_v33_logs', JSON.stringify(logs)); playPop(); refresh(); }
    
    function renderHist() {
        document.getElementById('logList').innerHTML = logs.filter(l => l.b === curBranch).map(l => `
            <div class="item-card" style="margin-bottom:10px; border-left:4px solid ${l.diff.includes('+')?'var(--success)':'var(--danger)'}">
                <div style="font-size:10px; opacity:0.5;">${l.t}</div>
                <div style="display:flex; justify-content:space-between; margin:5px 0;"><b>${l.s} | ${l.sph}/${l.cyl}</b><b style="color:${l.diff.includes('+')?'var(--success)':'var(--danger)'}">${l.diff}</b></div>
                <div style="font-size:12px; opacity:0.8;">${l.n}</div>
            </div>`).join('');
    }

    showPage('dash');
</script>
</body>
</html>
